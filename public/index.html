<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hub — Notizie Live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f7f7f5;
      --bg3: #f0efed;
      --text: #1a1a1a;
      --text2: #6b6b6b;
      --text3: #9b9b9b;
      --border: rgba(0,0,0,0.10);
      --border2: rgba(0,0,0,0.18);
      --accent: #2563eb;
      --radius: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg2: #242424;
        --bg3: #2e2e2e;
        --text: #f0f0f0;
        --text2: #a0a0a0;
        --text3: #666;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.18);
      }
    }

    body { font-family: 'Inter', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }

    /* TOPBAR */
    .topbar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
    .logo span { color: var(--accent); }

    .mainnav { display: flex; }
    .mainnav button {
      background: none; border: none;
      padding: 0 1.1rem; height: 58px;
      font-size: 14px; font-weight: 500;
      color: var(--text2); cursor: pointer;
      border-bottom: 2.5px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 6px;
    }
    .mainnav button:hover { color: var(--text); }
    .mainnav button.active { color: var(--text); border-bottom-color: var(--accent); }

    .live { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
    .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #ef4444; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* SUBNAV */
    .subnav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      overflow-x: auto;
    }
    .subnav::-webkit-scrollbar { display: none; }
    .subnav button {
      background: none; border: none;
      padding: 0 1rem; height: 42px;
      font-size: 13px; color: var(--text2); cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .subnav button:hover { color: var(--text); }
    .subnav button.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }

    /* CONTENT */
    .content { padding: 1.25rem 1.5rem; max-width: 1100px; margin: 0 auto; }
    .toprow { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
    .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
    .refresh-btn {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      color: var(--text2);
      display: flex; align-items: center; gap: 5px;
      font-family: 'Inter', sans-serif;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: var(--bg3); }
    .last-update { font-size: 12px; color: var(--text3); margin-bottom: 1rem; }

    /* GRID */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1rem; }

    .card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.2rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .card:hover { border-color: var(--border2); transform: translateY(-1px); }

    .card-tag {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;
      align-self: flex-start;
    }
    .tw { background: #dbeafe; color: #1e40af; }
    .tm { background: #ede9fe; color: #4c1d95; }
    .ts { background: #dcfce7; color: #14532d; }

    .card-title { font-size: 14px; font-weight: 500; line-height: 1.45; color: var(--text); }
    .card-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .card-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
    .card-source { font-weight: 600; color: var(--text2); }

    /* LOADING */
    .loading { display: flex; align-items: center; justify-content: center; padding: 4rem; color: var(--text2); font-size: 14px; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 3rem; color: var(--text2); font-size: 14px; line-height: 1.7; }

    /* MODAL */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .modal-box {
      background: var(--bg);
      border-radius: var(--radius);
      max-width: 640px; width: 100%;
      max-height: 85vh; overflow-y: auto;
      padding: 1.5rem; position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: none; border: none;
      font-size: 22px; cursor: pointer;
      color: var(--text2); line-height: 1;
    }
    .modal-tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; margin-bottom: 10px; }
    .modal-title { font-size: 19px; font-weight: 600; line-height: 1.35; margin-bottom: 10px; padding-right: 2rem; }
    .modal-meta { font-size: 13px; color: var(--text2); padding-bottom: 1rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .modal-body { font-size: 15px; line-height: 1.75; color: var(--text2); }
    .modal-link {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 1.25rem; font-size: 13px; color: var(--accent);
      text-decoration: none; font-weight: 500;
    }
    .modal-link:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .topbar { padding: 0 1rem; }
      .mainnav button { padding: 0 0.7rem; font-size: 13px; }
      .content { padding: 1rem; }
      .hero-card { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">Hub<span>.</span></div>
  <nav class="mainnav">
    <button class="active" onclick="switchArea('world')">🌍 Mondo</button>
    <button onclick="switchArea('music')">🎵 Musica</button>
    <button onclick="switchArea('sport')">🏆 Sport</button>
  </nav>
  <div class="live"><div class="live-dot"></div> Live</div>
</div>

<div class="subnav" id="subnav"></div>

<div class="content">
  <div class="toprow">
    <div class="section-label" id="section-label">Ultime notizie dal mondo</div>
    <button class="refresh-btn" onclick="loadNews()">↻ Aggiorna</button>
  </div>
  <div class="last-update" id="last-update"></div>
  <div id="cards-container"></div>
</div>

<div id="modal" style="display:none"></div>

<script>
const AREAS = {
  world: {
    label: 'Ultime notizie dal mondo',
    tagClass: 'tw',
    subs: [
      { id: 'all',         label: 'Tutte',       cat: 'general',    q: null },
      { id: 'politics',    label: 'Politica',    cat: null,         q: 'politics government' },
      { id: 'war',         label: 'Conflitti',   cat: null,         q: 'war conflict military' },
      { id: 'economy',     label: 'Economia',    cat: 'business',   q: null },
      { id: 'science',     label: 'Scienza',     cat: 'science',    q: null },
      { id: 'tech',        label: 'Tecnologia',  cat: 'technology', q: null },
      { id: 'environment', label: 'Ambiente',    cat: null,         q: 'climate environment' },
      { id: 'health',      label: 'Salute',      cat: 'health',     q: null },
    ]
  },
  music: {
    label: 'Notizie dal mondo della musica',
    tagClass: 'tm',
    subs: [
      { id: 'all',     label: 'Tutte',           cat: 'entertainment', q: null },
      { id: 'rnb',     label: 'R&B / Soul',      cat: null, q: 'RnB soul music new' },
      { id: 'rap',     label: 'Rap / Hip-Hop',   cat: null, q: 'rap hip hop music' },
      { id: 'pop',     label: 'Pop',             cat: null, q: 'pop music new release' },
      { id: 'albums',  label: 'Album usciti',    cat: null, q: 'new album release music' },
      { id: 'singles', label: 'Singoli',         cat: null, q: 'new single song music release' },
      { id: 'artists', label: 'Artisti & gossip',cat: null, q: 'singer celebrity news personal' },
    ]
  },
  sport: {
    label: 'Notizie sportive',
    tagClass: 'ts',
    subs: [
      { id: 'all',      label: 'Tutti',          cat: 'sports', q: null },
      { id: 'tennis',   label: 'Tennis',         cat: null, q: 'tennis ATP WTA tournament' },
      { id: 'calcio',   label: 'Calcio',         cat: null, q: 'football soccer Serie A Champions League' },
      { id: 'basket',   label: 'Basket',         cat: null, q: 'basketball NBA EuroLeague' },
      { id: 'f1',       label: 'Formula 1',      cat: null, q: 'Formula 1 F1 Grand Prix' },
      { id: 'ciclismo', label: 'Ciclismo',       cat: null, q: 'cycling Tour de France Giro' },
      { id: 'atletica', label: 'Atletica',       cat: null, q: 'athletics running track field' },
      { id: 'atleti',   label: 'Atleti & gossip',cat: null, q: 'athlete sport celebrity personal news' },
    ]
  }
};

let currentArea = 'world';
let currentSub = 'all';
let articles = [];

function switchArea(area) {
  currentArea = area;
  currentSub = 'all';
  document.querySelectorAll('.mainnav button').forEach((b, i) => {
    b.classList.toggle('active', ['world','music','sport'][i] === area);
  });
  renderSubnav();
  loadNews();
}

function switchSub(subId) {
  currentSub = subId;
  document.querySelectorAll('.subnav button').forEach(b => {
    b.classList.toggle('active', b.dataset.sub === subId);
  });
  const sub = AREAS[currentArea].subs.find(s => s.id === subId);
  document.getElementById('section-label').textContent = sub ? sub.label : AREAS[currentArea].label;
  loadNews();
}

function renderSubnav() {
  const subs = AREAS[currentArea].subs;
  document.getElementById('subnav').innerHTML = subs.map(s =>
    `<button data-sub="${s.id}" class="${s.id === currentSub ? 'active' : ''}" onclick="switchSub('${s.id}')">${s.label}</button>`
  ).join('');
  document.getElementById('section-label').textContent = AREAS[currentArea].label;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'Adesso';
  if (m < 60) return m + ' min fa';
  const h = Math.floor(m / 60);
  if (h < 24) return h + (h === 1 ? ' ora fa' : ' ore fa');
  const d = Math.floor(h / 24);
  return d + (d === 1 ? ' giorno fa' : ' giorni fa');
}

async function loadNews() {
  const container = document.getElementById('cards-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Caricamento notizie...</div>';

  try {
    const res = await fetch(`/.netlify/functions/news?area=${currentArea}&sub=${currentSub}`);
    const data = await res.json();

    if (data.status !== 'ok') throw new Error(data.message || 'Errore API');

    articles = (data.articles || []).filter(a => a.title && a.title !== '[Removed]');
    renderCards(articles);
    document.getElementById('last-update').textContent =
      'Aggiornato alle ' + new Date().toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' });
  } catch(e) {
    container.innerHTML = `<div class="empty">⚠️ Impossibile caricare le notizie.<br><small>${e.message}</small></div>`;
  }
}

function renderCards(items) {
  const container = document.getElementById('cards-container');
  const area = AREAS[currentArea];
  const subLabel = area.subs.find(s => s.id === currentSub)?.label || '';

  if (!items.length) {
    container.innerHTML = '<div class="empty">Nessuna notizia trovata per questa sezione.</div>';
    return;
  }

  container.innerHTML = '<div class="grid">' + items.map((item, i) => `
    <div class="card" onclick="openModal(${i})">
      <div class="card-tag ${area.tagClass}">${subLabel}</div>
      <div class="card-title">${esc(item.title)}</div>
      ${item.description ? `<div class="card-desc">${esc(item.description.slice(0,130))}${item.description.length > 130 ? '…' : ''}</div>` : ''}
      <div class="card-meta">
        <span class="card-source">${esc(item.source?.name || '')}</span>
        ${item.publishedAt ? ' · ' + timeAgo(item.publishedAt) : ''}
      </div>
    </div>
  `).join('') + '</div>';
}

function openModal(idx) {
  const item = articles[idx];
  const area = AREAS[currentArea];
  const subLabel = area.subs.find(s => s.id === currentSub)?.label || '';
  const modal = document.getElementById('modal');
  modal.style.display = 'flex';
  modal.className = 'modal-backdrop';
  modal.innerHTML = `
    <div class="modal-box">
      <button class="modal-close" onclick="closeModal()" aria-label="Chiudi">×</button>
      <div class="modal-tag ${area.tagClass}">${subLabel}</div>
      <div class="modal-title">${esc(item.title)}</div>
      <div class="modal-meta">
        <strong>${esc(item.source?.name || '')}</strong>
        ${item.publishedAt ? ' · ' + timeAgo(item.publishedAt) : ''}
      </div>
      <div class="modal-body">${esc(item.description || 'Nessuna descrizione disponibile.')}</div>
      ${item.url ? `<a class="modal-link" href="${esc(item.url)}" target="_blank">→ Leggi articolo completo</a>` : ''}
    </div>
  `;
  modal.onclick = e => { if (e.target === modal) closeModal(); };
}

function closeModal() {
  document.getElementById('modal').style.display = 'none';
}

function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

renderSubnav();
loadNews();
</script>
</body>
</html>
